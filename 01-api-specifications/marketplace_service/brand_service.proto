syntax = "proto3";
package brand_service;

option go_package = "./pb";

// Импорт для gRPC Gateway (HTTP-аннотации)
import "google/api/annotations.proto";
import "google/api/http.proto";

// Вспомогательные импорты
import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";

// === ОБЩИЕ СТРУКТУРЫ ===

message MetaInfo {
  string request_id = 1;
  int64 timestamp = 2;
}

// === ПЕРЕЧИСЛЕНИЯ ===

enum Category {
  UNKNOWN = 0;
  ACCESSORIES = 1;
  CLOTHES = 2;
  FOOTWEAR = 3;
}

// === ВСПОМОГАТЕЛЬНЫЕ СООБЩЕНИЯ ===

message Media {
  string url = 1;
  int32 order = 2;
}

// === БИЗНЕС-СУЩНОСТИ ===

message Brand {
  int64 id = 1;
  string name = 2;
  repeated Media media = 3;
  Category category = 4;
}

// === ЗАПРОСЫ И ОТВЕТЫ ===

message ListBrandsRequest {
  string auth_data = 1;      // Авторизация
  Category category = 2;     // Фильтр (опционально)
  int32 page = 3;
  int32 limit = 4;
}

message ListBrandsResponse {
  bool status = 1;           // Буллевый статус
  MetaInfo meta_info = 2;    // Мета-данные
  repeated Brand brands = 3; // Список брендов
}

// === СЕРВИС ===

service BrandService {
  rpc ListBrands(ListBrandsRequest) returns (ListBrandsResponse) {
    option(google.api.http) = {
      get: "/api/v1/brands"
    };
  }
}