# ================= СКАЛЯРЫ =================
scalar ISO8601DateTime # Кастомный тип для дат. Сервер сам валидирует формат "YYYY-MM-DDTHH:mm:ssZ"

# ================= ТИПЫ =================
type Item {
  id: ID!
  name: String!
  description: String
  price: Float!
  bonusPoints: Int!
  stock: Int!
  createdAt: ISO8601DateTime!
  updatedAt: ISO8601DateTime
}

type DeleteItemPayload {
  success: Boolean!
  errorMessage: String
}

# ================= ОПЕРАЦИИ =================
type Query {
  item(id: ID!): Item
  items: [Item!]!
}

type Mutation {
  createItem(
    idempotencyKey: String!
    name: String!
    description: String
    price: Float!
    bonusPoints: Int!
    stock: Int!
  ): Item!

  updateItem(
    id: ID!
    name: String
    description: String
    price: Float
    bonusPoints: Int
    stock: Int
  ): Item!

  deleteItem(id: ID!): DeleteItemPayload!
}

# ================= SCHEMA =================
schema {
  query: Query
  mutation: Mutation
}